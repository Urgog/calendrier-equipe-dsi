<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail" data-bg-color="#f4f2ee">
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="800" fill="#f4f2ee"/>
<rect x="200" y="200" width="800" height="400" rx="24" fill="#ffffff" stroke="#d8d4cc" stroke-width="4"/>
<rect x="200" y="200" width="800" height="80" rx="24" fill="#e9e5db"/>
<circle cx="400" cy="380" r="16" fill="#7fbf8f"/>
<circle cx="600" cy="380" r="16" fill="#8fb0d9"/>
<circle cx="800" cy="380" r="16" fill="#e0ab6f"/>
<rect x="360" y="440" width="80" height="24" rx="6" fill="#dbeee0"/>
<rect x="560" y="440" width="80" height="24" rx="6" fill="#dde8f5"/>
<rect x="760" y="440" width="80" height="24" rx="6" fill="#f6e6d3"/>

</template>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: oklch(0.98 0.003 90); font-family: Helvetica, Arial, sans-serif; }
  select.status-select { appearance: none; -webkit-appearance: none; border: none; cursor: pointer; }
  select.status-select:focus { outline: 2px solid oklch(0.55 0.03 250); outline-offset: 1px; }
  .name-input { border: none; background: transparent; font-size: 14px; font-weight: 600; font-family: inherit; width: 100%; padding: 2px 0; }
  .name-input:focus { outline: none; border-bottom: 1px solid oklch(0.6 0.05 250); }
  @media print {
    [data-no-print] { display: none !important; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</helmet>
<div style="width:1280px; margin:0 auto; padding:48px 40px 64px; box-sizing:border-box; background:{{ theme.page }}; color:{{ theme.text }}; min-height:100vh;">

  <div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px;">
    <div>
      <div style="display:flex; align-items:center; gap:8px; font-size:14px; letter-spacing:0.08em; text-transform:uppercase; color:{{ theme.muted }}; margin-bottom:6px;">
        Planning d'équipe
        <span style="width:7px; height:7px; border-radius:50%; background:{{ syncDot }}; display:inline-block;"></span>
        <span style="text-transform:none; letter-spacing:normal; font-size:12px;">{{ syncLabel }}</span>
      </div>
      <h1 style="margin:0; font-size:34px; font-weight:700;">Présence &amp; télétravail</h1>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <button onClick="{{ prevWeek }}" style="width:36px; height:36px; border-radius:50%; border:1px solid {{ theme.btnBorder }}; background:{{ theme.card }}; color:{{ theme.text }}; font-size:16px; cursor:pointer;">‹</button>
      <div style="font-size:16px; font-weight:600; min-width:280px; text-align:center;">{{ weekLabel }}</div>
      <button onClick="{{ nextWeek }}" style="width:36px; height:36px; border-radius:50%; border:1px solid {{ theme.btnBorder }}; background:{{ theme.card }}; color:{{ theme.text }}; font-size:16px; cursor:pointer;">›</button>
      <button onClick="{{ goToday }}" style="margin-left:8px; padding:8px 16px; border-radius:8px; border:1px solid {{ theme.btnBorder }}; background:{{ theme.card }}; color:{{ theme.muted2 }}; font-size:14px; cursor:pointer;">Aujourd'hui</button>
      <button onClick="{{ toggleTheme }}" style="width:36px; height:36px; border-radius:50%; border:1px solid {{ theme.btnBorder }}; background:{{ theme.card }}; color:{{ theme.text }}; font-size:16px; cursor:pointer;" title="Basculer clair / sombre">{{ themeIcon }}</button>
      <button data-no-print="true" onClick="{{ toggleMinimal }}" title="Vue minimaliste" style="padding:8px 16px; border-radius:8px; border:1px solid {{ theme.btnBorder }}; background:{{ theme.card }}; color:{{ theme.muted2 }}; font-size:14px; cursor:pointer;">{{ minimalToggleLabel }}</button>
      <button data-no-print="true" onClick="{{ toggleHistory }}" title="Historique" style="width:36px; height:36px; border-radius:50%; border:1px solid {{ theme.btnBorder }}; background:{{ theme.card }}; color:{{ theme.text }}; font-size:16px; cursor:pointer;">🕘</button>
      <button data-no-print="true" onClick="{{ doPrint }}" title="Exporter / imprimer" style="width:36px; height:36px; border-radius:50%; border:1px solid {{ theme.btnBorder }}; background:{{ theme.card }}; color:{{ theme.text }}; font-size:16px; cursor:pointer;">⬇</button>
    </div>
  </div>

  <sc-if value="{{ showHistory }}" hint-placeholder-val="{{ false }}">
    <div data-no-print="true" style="margin-bottom:20px; padding:14px 18px; border-radius:12px; border:1px solid {{ theme.border }}; background:{{ theme.card }}; max-height:200px; overflow-y:auto;">
      <div style="font-size:13px; font-weight:600; margin-bottom:8px;">Historique récent</div>
      <sc-for list="{{ historyList }}" as="h" hint-placeholder-count="3">
        <div style="display:flex; justify-content:space-between; gap:12px; font-size:12px; color:{{ theme.muted2 }}; padding:4px 0; border-top:1px solid {{ theme.borderLight }};">
          <span>{{ h.text }}</span>
          <span>{{ h.time }}</span>
        </div>
      </sc-for>
    </div>
  </sc-if>

  <div style="display:flex; align-items:center; flex-wrap:wrap; gap:20px; margin-bottom:20px;">
    <sc-for list="{{ legend }}" as="item" hint-placeholder-count="3">
      <button onClick="{{ item.onClick }}" style="display:flex; align-items:center; gap:8px; font-size:14px; color:{{ theme.muted2 }}; border:none; background:transparent; cursor:pointer; padding:4px 8px; border-radius:20px; opacity:{{ item.opacity }};">
        <span style="width:10px; height:10px; border-radius:50%; background:{{ item.dot }}; display:inline-block;"></span>
        {{ item.label }}
      </button>
    </sc-for>
    <button data-no-print="true" onClick="{{ toggleAddStatus }}" style="font-size:13px; padding:6px 12px; border-radius:20px; border:1px dashed {{ theme.btnBorder }}; background:transparent; color:{{ theme.muted2 }}; cursor:pointer;">+ Ajouter un motif</button>
  </div>

  <sc-if value="{{ showAddStatus }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:14px 18px; border-radius:12px; border:1px solid {{ theme.border }}; background:{{ theme.card }}; margin-bottom:20px;">
      <input type="text" value="{{ newStatusLabel }}" onChange="{{ onNewStatusLabelChange }}" placeholder="Nom du motif (ex: Formation)" style="padding:8px 10px; border-radius:8px; border:1px solid {{ theme.btnBorder }}; background:{{ theme.page }}; color:{{ theme.text }}; font-size:13px; min-width:200px;"></input>
      <div style="display:flex; gap:6px;">
        <sc-for list="{{ hueSwatches }}" as="sw" hint-placeholder-count="5">
          <button onClick="{{ sw.onSelect }}" style="width:26px; height:26px; border-radius:50%; background:{{ sw.dot }}; cursor:pointer; box-shadow:{{ sw.ring }};"></button>
        </sc-for>
      </div>
      <button onClick="{{ confirmAddStatus }}" style="padding:8px 16px; border-radius:8px; border:none; background:oklch(0.4 0.06 250); color:white; font-size:13px; font-weight:600; cursor:pointer;">Ajouter</button>
      <button onClick="{{ toggleAddStatus }}" style="padding:8px 12px; border-radius:8px; border:none; background:transparent; color:{{ theme.muted2 }}; font-size:13px; cursor:pointer;">Annuler</button>
    </div>
  </sc-if>

  <div style="border:1px solid {{ theme.border }}; border-radius:16px; overflow:hidden; background:{{ theme.card }};">
    <div style="display:grid; grid-template-columns:240px repeat(5, 1fr) 44px;">
      <div style="padding:16px 20px; font-size:13px; font-weight:600; color:{{ theme.muted }}; border-bottom:1px solid {{ theme.border }}; background:{{ theme.headerBg }};">Membre</div>
      <sc-for list="{{ weekDays }}" as="day" hint-placeholder-count="5">
        <div style="padding:16px 12px; text-align:center; border-bottom:1px solid {{ theme.border }}; border-left:1px solid {{ theme.borderLight }}; background:{{ day.headerBg }};">
          <div style="font-size:13px; font-weight:700; text-transform:capitalize; color:{{ day.nameColor }};">{{ day.name }}</div>
          <div style="font-size:12px; color:{{ theme.muted2 }}; margin-top:2px;">{{ day.dateLabel }}</div>
          <div style="display:flex; justify-content:center; gap:6px; margin-top:6px; flex-wrap:wrap;">
            <sc-for list="{{ day.summary }}" as="sp" hint-placeholder-count="2">
              <span style="display:flex; align-items:center; gap:3px; font-size:11px; color:{{ theme.muted2 }};">
                <span style="width:6px; height:6px; border-radius:50%; background:{{ sp.dot }}; display:inline-block;"></span>{{ sp.n }}
              </span>
            </sc-for>
          </div>
        </div>
      </sc-for>
      <div style="border-bottom:1px solid {{ theme.border }}; background:{{ theme.headerBg }};"></div>
    </div>

    <sc-for list="{{ people }}" as="person" hint-placeholder-count="8">
      <div draggable="true" onDragStart="{{ person.onDragStart }}" onDragOver="{{ person.onDragOver }}" onDragEnter="{{ person.onDragEnter }}" onDragEnd="{{ person.onDragEnd }}" onDrop="{{ person.onDrop }}" style="display:grid; grid-template-columns:240px repeat(5, 1fr) 44px; border-top:2px solid {{ person.rowBorderColor }}; opacity:{{ person.rowOpacity }}; cursor:grab; transition:border-color 0.1s;">
        <div style="padding:14px 20px; display:flex; align-items:center; gap:12px; min-width:0; position:relative;">
          <span style="font-size:13px; color:{{ theme.muted }}; cursor:grab;">⋮⋮</span>
          <div onClick="{{ person.onAvatarClick }}" style="width:36px; height:36px; border-radius:50%; background:{{ person.avatarColor }}; color:white; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; flex-shrink:0; cursor:pointer;">
            <sc-if value="{{ person.icon }}" hint-placeholder-val="{{ false }}">{{ person.icon }}</sc-if>
            <sc-if value="{{ person.iconEmpty }}" hint-placeholder-val="{{ true }}">{{ person.initials }}</sc-if>
          </div>
          <input class="name-input" type="text" value="{{ person.name }}" onChange="{{ person.onNameChange }}" onBlur="{{ person.onNameBlur }}" style="color:{{ theme.text }};"></input>
          <sc-if value="{{ person.isEditing }}" hint-placeholder-val="{{ false }}">
            <div data-person-editor="{{ person.id }}" style="position:absolute; z-index:10; top:100%; left:20px; margin-top:4px; padding:12px; border-radius:10px; background:{{ theme.card }}; border:1px solid {{ theme.border }}; box-shadow:0 6px 20px rgba(0,0,0,0.15); width:220px;">
              <div style="font-size:11px; color:{{ theme.muted2 }}; margin-bottom:6px;">Couleur</div>
              <div style="display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;">
                <sc-for list="{{ person.colorSwatches }}" as="sw" hint-placeholder-count="7">
                  <button type="button" onClick="{{ sw.onSelect }}" style="width:22px; height:22px; border-radius:50%; border:none; background:{{ sw.color }}; box-shadow:{{ sw.ring }}; cursor:pointer;"></button>
                </sc-for>
              </div>
              <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
                <div style="font-size:11px; color:{{ theme.muted2 }};">Icône</div>
                <button type="button" onClick="{{ person.onResetIcon }}" style="font-size:11px; border:none; background:transparent; color:{{ theme.muted2 }}; text-decoration:underline; cursor:pointer; padding:0;">Revenir aux lettres</button>
              </div>
              <div style="display:flex; gap:4px; flex-wrap:wrap;">
                <sc-for list="{{ person.iconChoices }}" as="ic" hint-placeholder-count="6">
                  <button type="button" onClick="{{ ic.onSelect }}" style="width:24px; height:24px; border-radius:6px; border:none; background:transparent; font-size:14px; cursor:pointer;">{{ ic.icon }}</button>
                </sc-for>
              </div>
            </div>
          </sc-if>
        </div>
        <sc-for list="{{ person.days }}" as="cell" hint-placeholder-count="5">
          <div style="padding:10px; position:relative; border-left:1px solid {{ theme.borderLight }};">
            <div style="display:flex; align-items:center; gap:6px;">
              <select class="status-select" value="{{ cell.status }}" onChange="{{ cell.onChange }}" style="flex:1; min-width:0; padding:8px 10px; border-radius:8px; font-size:13px; font-weight:600; background:{{ cell.bg }}; color:{{ cell.color }}; opacity:{{ cell.opacity }}; box-shadow:{{ cell.dotRing }};">
                <sc-for list="{{ cell.cellOptions }}" as="opt" hint-placeholder-count="3">
                  <option value="{{ opt.value }}" onClick="{{ opt.onPick }}">{{ opt.label }}</option>
                </sc-for>
              </select>
              <sc-if value="{{ cell.recurringLabel }}" hint-placeholder-val="{{ false }}">
                <button type="button" onClick="{{ cell.onRemoveRecurring }}" title="{{ cell.recurringLabel }} — cliquer pour retirer" style="flex-shrink:0; width:22px; height:22px; border-radius:50%; border:none; background:{{ cell.color }}; color:{{ cell.bg }}; font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;">↻</button>
              </sc-if>
            </div>
            <sc-if value="{{ cell.showConfirm }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute; z-index:10; top:100%; left:10px; right:10px; margin-top:4px; padding:10px; border-radius:10px; background:{{ theme.card }}; border:1px solid {{ theme.border }}; box-shadow:0 6px 20px rgba(0,0,0,0.12);">
                <div style="font-size:12px; margin-bottom:8px;">Appliquer chaque {{ cell.dayName }} ?</div>
                <div style="display:flex; gap:6px;">
                  <button onClick="{{ cell.onConfirmYes }}" style="flex:1; padding:6px; border-radius:6px; border:none; background:oklch(0.4 0.06 250); color:white; font-size:12px; cursor:pointer;">Oui, récurrent</button>
                  <button onClick="{{ cell.onConfirmNo }}" style="flex:1; padding:6px; border-radius:6px; border:1px solid {{ theme.btnBorder }}; background:transparent; color:{{ theme.text }}; font-size:12px; cursor:pointer;">Non, ponctuel</button>
                </div>
              </div>
            </sc-if>
          </div>
        </sc-for>
        <div style="display:flex; align-items:center; justify-content:center;">
          <button data-no-print="true" onClick="{{ person.onRemove }}" title="Supprimer" style="width:26px; height:26px; border-radius:50%; border:none; background:transparent; color:{{ theme.muted }}; font-size:16px; cursor:pointer;">×</button>
        </div>
      </div>
    </sc-for>

    <div style="border-top:1px solid {{ theme.borderLight }}; padding:14px 20px;" data-no-print="true">
      <button onClick="{{ addPerson }}" style="font-size:13px; padding:8px 16px; border-radius:8px; border:1px dashed {{ theme.btnBorder }}; background:transparent; color:{{ theme.muted2 }}; cursor:pointer;">+ Ajouter un membre</button>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const BASE_STATUSES = [
  { key: 'sur_place', label: 'Sur place', hue: 145 },
  { key: 'teletravail', label: 'Télétravail', hue: 250 },
  { key: 'conge', label: 'Congé / absent', hue: 70 },
];
const SWATCH_HUES = [290, 330, 20, 195, 90];
const DAY_NAMES = ['lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi'];
const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const PEOPLE_SEED = ['Nadège','Thomas C','Thomas R','Manon','Simon','Pierrick','Damien','Laure','Yannick'];
const AVATAR_COLORS = ['oklch(0.6 0.1 20)','oklch(0.6 0.1 60)','oklch(0.58 0.1 145)','oklch(0.58 0.1 195)','oklch(0.58 0.1 250)','oklch(0.58 0.1 290)','oklch(0.58 0.1 330)'];
const ICON_CHOICES = ['','😀','🐱','🐶','🦊','🐼','🌟','🔥','🌈','⚡','🎯','🚀'];

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD2FtcLPjA2PjaQBRLwnLsdAPXiatKZ_CQ",
  authDomain: "planning-equipe-3f923.firebaseapp.com",
  databaseURL: "https://planning-equipe-3f923-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "planning-equipe-3f923",
  storageBucket: "planning-equipe-3f923.firebasestorage.app",
  messagingSenderId: "620800734132",
  appId: "1:620800734132:web:b4529892f32d7b17b2f8e1",
};

function waitForFirebase(retries) {
  retries = retries || 100;
  return new Promise((resolve, reject) => {
    (function check() {
      if (window.firebase && window.firebase.database) resolve();
      else if (retries-- > 0) setTimeout(check, 100);
      else reject(new Error('Firebase SDK non chargé'));
    })();
  });
}

const THEME = {
  light: { page:'oklch(0.98 0.003 90)', text:'oklch(0.22 0.01 90)', muted:'oklch(0.5 0.01 90)', muted2:'oklch(0.55 0.01 90)', card:'oklch(1 0 0)', border:'oklch(0.9 0.008 90)', borderLight:'oklch(0.93 0.008 90)', headerBg:'oklch(0.965 0.004 90)', btnBorder:'oklch(0.85 0.01 90)' },
  dark: { page:'oklch(0.19 0.006 260)', text:'oklch(0.93 0.005 260)', muted:'oklch(0.66 0.01 260)', muted2:'oklch(0.62 0.01 260)', card:'oklch(0.24 0.008 260)', border:'oklch(0.33 0.012 260)', borderLight:'oklch(0.3 0.012 260)', headerBg:'oklch(0.27 0.01 260)', btnBorder:'oklch(0.4 0.012 260)' },
};

function statusColors(hue, dark) {
  return dark
    ? { bg: `oklch(0.32 0.06 ${hue})`, color: `oklch(0.88 0.05 ${hue})`, dot: `oklch(0.65 0.14 ${hue})` }
    : { bg: `oklch(0.9 0.06 ${hue})`, color: `oklch(0.34 0.09 ${hue})`, dot: `oklch(0.65 0.14 ${hue})` };
}
function initials(name) {
  return name.split(' ').filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase() || '?';
}
function startOfWeek(date) {
  const d = new Date(date);
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day);
  d.setHours(0, 0, 0, 0);
  return d;
}

class Component extends DCLogic {
  state = {
    theme: 'light',
    weekOffset: 0,
    showAddStatus: false,
    newStatusLabel: '',
    newStatusHue: SWATCH_HUES[0],
    synced: false,
    people: {},
    nextPersonId: PEOPLE_SEED.length,
    statuses: {},
    customStatuses: {},
    recurring: {},
    confirmCell: null,
    order: [],
    editingPersonId: null,
    dragId: null,
    dragOverId: null,
    liveOrder: null,
    nameDrafts: {},
    minimal: false,
    filterStatus: 'all',
    showHistory: false,
    history: {},
  };

  componentDidUpdate() {
    document.body.style.background = THEME[this.state.theme].page;
  }

  handleDocClick = (e) => {
    if (this.state.editingPersonId && !e.target.closest('[data-person-editor]')) {
      this.setState({ editingPersonId: null });
    }
  };

  componentWillUnmount() {
    document.removeEventListener('mousedown', this.handleDocClick);
  }

  async componentDidMount() {
    document.body.style.background = THEME[this.state.theme].page;
    document.addEventListener('mousedown', this.handleDocClick);
    try {
      await waitForFirebase();
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      this.dbRef = firebase.database().ref('planning');
      this.dbRef.on('value', (snap) => {
        const data = snap.val();
        if (!data) {
          const seedPeople = {};
          PEOPLE_SEED.forEach((name, i) => { seedPeople[i] = { name }; });
          const order = PEOPLE_SEED.map((_, i) => String(i));
          this.dbRef.set({ people: seedPeople, nextPersonId: PEOPLE_SEED.length, statuses: {}, customStatuses: {}, recurring: {}, order, history: {} });
          return;
        }
        const rawPeople = data.people || {};
        const people = {};
        Object.keys(rawPeople).forEach(id => {
          const v = rawPeople[id];
          const hadName = typeof v === 'string' ? !!v : !!(v && v.name);
          const name = typeof v === 'string' ? v : (v && v.name) || 'Sans nom';
          people[id] = typeof v === 'string' ? { name } : { ...v, name };
          if (!hadName && this.dbRef) this.dbRef.child('people/' + id + '/name').set(name);
        });
        const order = (data.order && data.order.length ? data.order : Object.keys(people));
        Object.keys(people).forEach(id => { if (order.indexOf(id) === -1) order.push(id); });
        this.setState({
          people,
          order,
          nextPersonId: data.nextPersonId || PEOPLE_SEED.length,
          statuses: data.statuses || {},
          customStatuses: data.customStatuses || {},
          recurring: data.recurring || {},
          history: data.history || {},
          synced: true,
        });
      });
    } catch (e) {
      console.error(e);
    }
  }

  prevWeek = () => this.setState(s => ({ weekOffset: s.weekOffset - 1 }));
  nextWeek = () => this.setState(s => ({ weekOffset: s.weekOffset + 1 }));
  goToday = () => this.setState({ weekOffset: 0 });
  toggleTheme = () => this.setState(s => ({ theme: s.theme === 'light' ? 'dark' : 'light' }));
  toggleMinimal = () => this.setState(s => ({ minimal: !s.minimal }));
  setFilterStatus = (key) => this.setState(s => ({ filterStatus: s.filterStatus === key ? 'all' : key }));
  toggleHistory = () => this.setState(s => ({ showHistory: !s.showHistory }));
  doPrint = () => window.print();

  logHistory(text) {
    if (!this.dbRef) return;
    this.dbRef.child('history').push({ text, ts: Date.now() });
  }
  toggleAddStatus = () => this.setState(s => ({ showAddStatus: !s.showAddStatus, newStatusLabel: '', newStatusHue: SWATCH_HUES[0] }));

  confirmAddStatus = () => {
    const label = this.state.newStatusLabel.trim();
    if (!label || !this.dbRef) return;
    const key = 'custom_' + Date.now();
    this.dbRef.child('customStatuses/' + key).set({ label, hue: this.state.newStatusHue });
    this.setState({ showAddStatus: false, newStatusLabel: '' });
  };

  addPerson = () => {
    if (!this.dbRef) return;
    const id = String(this.state.nextPersonId);
    this.dbRef.child('people/' + id).set({ name: 'Nouveau membre' });
    this.dbRef.child('nextPersonId').set(this.state.nextPersonId + 1);
    this.dbRef.child('order').set([...this.state.order, id]);
    this.logHistory('Membre ajouté');
  };

  removePerson(id) {
    if (!this.dbRef) return;
    const pName = (this.state.people[id] && this.state.people[id].name) || 'Membre';
    this.dbRef.child('people/' + id).remove();
    this.dbRef.child('order').set(this.state.order.filter(o => o !== id));
    this.logHistory(pName + ' supprimé(e)');
  }

  onNameDraftChange(id, value) {
    this.setState(s => ({ nameDrafts: { ...s.nameDrafts, [id]: value } }));
  }

  commitName(id) {
    const draft = this.state.nameDrafts[id];
    if (draft === undefined) return;
    const finalName = draft.trim() === '' ? 'Sans nom' : draft;
    if (this.dbRef) this.dbRef.child('people/' + id + '/name').set(finalName);
    this.setState(s => {
      const drafts = { ...s.nameDrafts };
      delete drafts[id];
      return { nameDrafts: drafts };
    });
  }

  setPersonColor(id, color) {
    if (!this.dbRef) return;
    this.dbRef.child('people/' + id + '/color').set(color);
  }

  setPersonIcon(id, icon) {
    if (!this.dbRef) return;
    if (icon) this.dbRef.child('people/' + id + '/icon').set(icon);
    else this.dbRef.child('people/' + id + '/icon').remove();
  }

  toggleEditPerson(id, e) {
    if (e) e.stopPropagation();
    this.setState(s => ({ editingPersonId: s.editingPersonId === id ? null : id }));
  }

  onDragStart(id) { this.setState({ dragId: id, liveOrder: [...this.state.order] }); }
  onDragEnter(targetId) {
    const { dragId, liveOrder } = this.state;
    if (!dragId || dragId === targetId || !liveOrder) return;
    const newOrder = liveOrder.filter(o => o !== dragId);
    const idx = newOrder.indexOf(targetId);
    newOrder.splice(idx, 0, dragId);
    this.setState({ liveOrder: newOrder, dragOverId: targetId });
  }
  onDragEnd() { this.setState({ dragId: null, dragOverId: null, liveOrder: null }); }
  onDropOn(targetId) {
    const { dragId, liveOrder } = this.state;
    if (!dragId || !this.dbRef) { this.setState({ dragId: null, dragOverId: null, liveOrder: null }); return; }
    this.dbRef.child('order').set(liveOrder || this.state.order);
    this.setState({ dragId: null, dragOverId: null, liveOrder: null });
  }

  setStatus(personId, dayIdx, value) {
    if (!this.dbRef) return;
    const key = this.state.weekOffset + '_' + personId + '_' + dayIdx;
    this.dbRef.child('statuses/' + key).set(value);
    this.setState({ confirmCell: { personId, dayIdx, value } });
    const pName = (this.state.people[personId] && this.state.people[personId].name) || 'Quelqu\'un';
    const label = (BASE_STATUSES.find(s => s.key === value) || {}).label || value;
    this.logHistory(pName + ' → ' + label);
  }

  confirmRecurring(apply) {
    const cc = this.state.confirmCell;
    if (apply && cc && this.dbRef) {
      this.dbRef.child('recurring/' + cc.personId + '_' + cc.dayIdx).set(cc.value);
    }
    this.setState({ confirmCell: null });
  }

  removeRecurring(personId, dayIdx, currentStatus) {
    if (!this.dbRef) return;
    const updates = {};
    for (let w = -8; w <= 52; w++) {
      updates['statuses/' + w + '_' + personId + '_' + dayIdx] = currentStatus;
    }
    updates['recurring/' + personId + '_' + dayIdx] = null;
    this.dbRef.update(updates);
  }

  renderVals() {
    const isDark = this.state.theme === 'dark';
    const theme = THEME[this.state.theme];
    const customList = Object.keys(this.state.customStatuses).map(key => ({ key, ...this.state.customStatuses[key] }));
    const allStatuses = [...BASE_STATUSES, ...customList];

    const today = new Date();
    const todayDayIdx = this.state.weekOffset === 0 ? (today.getDay() + 6) % 7 : -1;

    const monday = startOfWeek(new Date());
    monday.setDate(monday.getDate() + this.state.weekOffset * 7);
    const weekDays = DAY_NAMES.map((name, i) => {
      const d = new Date(monday);
      d.setDate(d.getDate() + i);
      return {
        name, dateLabel: d.getDate() + ' ' + MONTHS[d.getMonth()], key: i, isToday: i === todayDayIdx,
        headerBg: i === todayDayIdx ? (isDark ? 'oklch(0.3 0.05 250)' : 'oklch(0.92 0.04 250)') : theme.headerBg,
        nameColor: i === todayDayIdx ? (isDark ? 'oklch(0.85 0.06 250)' : 'oklch(0.4 0.09 250)') : theme.text,
      };
    });
    const friday = new Date(monday);
    friday.setDate(friday.getDate() + 4);
    const sameMonth = monday.getMonth() === friday.getMonth();
    const weekLabel = sameMonth
      ? `${monday.getDate()} – ${friday.getDate()} ${MONTHS[friday.getMonth()]} ${friday.getFullYear()}`
      : `${monday.getDate()} ${MONTHS[monday.getMonth()]} – ${friday.getDate()} ${MONTHS[friday.getMonth()]} ${friday.getFullYear()}`;

    const displayOrder = this.state.liveOrder || this.state.order;
    const peopleIds = displayOrder.filter(id => this.state.people[id]);
    const people = peopleIds.map((id, pi) => {
      const p = this.state.people[id] || {};
      const draft = this.state.nameDrafts[id];
      const name = draft !== undefined ? draft : (p.name || 'Sans nom');
      const avatarColor = p.color || AVATAR_COLORS[pi % AVATAR_COLORS.length];
      const icon = p.icon || '';
      const isEditing = this.state.editingPersonId === id;
      const colorSwatches = AVATAR_COLORS.map(c => ({
        color: c,
        ring: c === avatarColor ? '0 0 0 2px white, 0 0 0 4px oklch(0.5 0.05 250)' : 'none',
        onSelect: () => this.setPersonColor(id, c),
      }));
      const iconChoices = ICON_CHOICES.map(ic => ({
        icon: ic || '🔤',
        selected: ic === icon,
        onSelect: () => this.setPersonIcon(id, ic),
      }));
      const days = weekDays.map((wd, di) => {
        const key = this.state.weekOffset + '_' + id + '_' + di;
        const recKey = id + '_' + di;
        const isRecurring = !!this.state.recurring[recKey];
        const statusKey = this.state.statuses[key] || this.state.recurring[recKey] || 'sur_place';
        const def = allStatuses.find(s => s.key === statusKey) || allStatuses[0];
        const c = statusColors(def.hue, isDark);
        const cc = this.state.confirmCell;
        const showConfirm = cc && cc.personId === id && cc.dayIdx === di;
        const dimmed = this.state.filterStatus !== 'all' && this.state.filterStatus !== statusKey;
        const cellBg = this.state.minimal ? theme.card : c.bg;
        const cellColor = this.state.minimal ? theme.text : c.color;
        return {
          key: id + '_' + di, status: statusKey, bg: cellBg, color: cellColor,
          dotColor: c.dot, minimal: this.state.minimal,
          opacity: dimmed ? 0.3 : 1,
          dotRing: this.state.minimal ? ('inset 0 0 0 2px ' + c.dot) : 'none',
          onChange: (e) => this.setStatus(id, di, e.target.value),
          cellOptions: allStatuses.map(s => ({ value: s.key, label: s.label, onPick: () => this.setStatus(id, di, s.key) })),
          isRecurring,
          recurringLabel: isRecurring ? 'Récurrent chaque ' + wd.name : null,
          onRemoveRecurring: () => this.removeRecurring(id, di, statusKey),
          showConfirm,
          onConfirmYes: () => this.confirmRecurring(true),
          onConfirmNo: () => this.confirmRecurring(false),
          dayName: wd.name,
        };
      });
      return {
        key: id,
        id,
        name,
        initials: initials(name),
        icon,
        iconEmpty: !icon,
        avatarColor,
        days,
        onNameChange: (e) => this.onNameDraftChange(id, e.target.value),
        onNameBlur: () => this.commitName(id),
        onRemove: () => this.removePerson(id),
        onDragStart: () => this.onDragStart(id),
        onDrop: (e) => { e.preventDefault(); this.onDropOn(id); },
        onDragOver: (e) => e.preventDefault(),
        onDragEnter: () => this.onDragEnter(id),
        onDragEnd: () => this.onDragEnd(),
        rowBorderColor: this.state.dragOverId === id ? 'oklch(0.5 0.15 250)' : theme.borderLight,
        rowOpacity: this.state.dragId === id ? 0.4 : 1,
        onAvatarClick: (e) => this.toggleEditPerson(id, e),
        isEditing,
        colorSwatches,
        iconChoices,
        onResetIcon: () => this.setPersonIcon(id, ''),
      };
    });

    const daySummaries = weekDays.map((wd, di) => {
      const counts = {};
      people.forEach(p => { const st = p.days[di].status; counts[st] = (counts[st] || 0) + 1; });
      const summary = allStatuses
        .map(s => ({ n: counts[s.key] || 0, dot: statusColors(s.hue, isDark).dot }))
        .filter(x => x.n > 0);
      weekDays[di].summary = summary;
      return { key: di, summary };
    });

    const statusOptions = allStatuses.map(s => ({ value: s.key, label: s.label }));
    const legend = allStatuses.map(s => ({
      key: s.key, label: s.label, dot: statusColors(s.hue, isDark).dot,
      opacity: this.state.filterStatus === 'all' || this.state.filterStatus === s.key ? 1 : 0.4,
      onClick: () => this.setFilterStatus(s.key),
    }));
    const historyList = Object.keys(this.state.history)
      .map(k => this.state.history[k])
      .sort((a, b) => b.ts - a.ts)
      .slice(0, 20)
      .map((h, i) => ({ key: i, text: h.text, time: new Date(h.ts).toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) }));
    const hueSwatches = SWATCH_HUES.map(hue => ({
      dot: statusColors(hue, isDark).dot,
      ring: hue === this.state.newStatusHue ? '0 0 0 2px white, 0 0 0 4px oklch(0.5 0.05 250)' : 'none',
      onSelect: () => this.setState({ newStatusHue: hue }),
    }));

    return {
      theme, themeIcon: isDark ? '☀' : '☾',
      syncDot: this.state.synced ? 'oklch(0.65 0.14 145)' : 'oklch(0.7 0.14 70)',
      syncLabel: this.state.synced ? 'Synchronisé' : 'Connexion…',
      weekLabel, weekDays, people, statusOptions, legend, daySummaries,
      showAddStatus: this.state.showAddStatus, newStatusLabel: this.state.newStatusLabel,
      hueSwatches,
      prevWeek: this.prevWeek, nextWeek: this.nextWeek, goToday: this.goToday,
      toggleTheme: this.toggleTheme, toggleAddStatus: this.toggleAddStatus,
      confirmAddStatus: this.confirmAddStatus, addPerson: this.addPerson,
      onNewStatusLabelChange: (e) => this.setState({ newStatusLabel: e.target.value }),
      minimal: this.state.minimal, toggleMinimal: this.toggleMinimal,
      minimalToggleLabel: this.state.minimal ? 'Vue détaillée' : 'Vue minimaliste',
      doPrint: this.doPrint,
      showHistory: this.state.showHistory, toggleHistory: this.toggleHistory, historyList,
    };
  }
}
</script>
